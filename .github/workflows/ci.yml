name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 .

    - name: Black
      run: |
        pip install black
        black --check .

    - name: Install from source
      run: |
        pip install .

    - name: Test
      run: |
        pip install pytest
        cd tests
        pytest .
