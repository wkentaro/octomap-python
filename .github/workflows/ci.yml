name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install from source
      run: uv sync --locked

    - name: Ruff lint
      run: uv run ruff check .

    - name: Ruff format
      run: uv run ruff format --check .

    - name: Test
      run: uv run pytest
