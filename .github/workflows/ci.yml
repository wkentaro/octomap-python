name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.14']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install from source
      run: uv sync --locked

    - name: Lint with flake8
      run: uv run flake8 .

    - name: Black
      run: uv run black --check .

    - name: Test
      run: uv run pytest
